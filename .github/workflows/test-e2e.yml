name: End-to-End Tests

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      mqtt:
        image: eclipse-mosquitto:latest
        options: >-
          --health-cmd "mosquitto_healthcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 1884:1883
          - 9002:9001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run E2E tests
        env:
          GLINET_HOST: 127.0.0.1
          GLINET_PASSWORD: MyPassword
          MQTT_HOST: mqtt://localhost:1884
          GLINET_API: true
        run: |
          npm run build
          npm run test:e2e

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            coverage/
            test-reports/
          retention-days: 30

      - name: Run coverage report
        if: always()
        run: npm run test:coverage